<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚔️ SLICE MASTER VR - Corta frutas!</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Arial', sans-serif; }
        
        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            right: 20px;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(10px);
            padding: 15px 25px;
            border-radius: 20px;
            color: white;
            z-index: 100;
            pointer-events: none;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-family: monospace;
            border: 1px solid rgba(255,255,255,0.2);
        }
        
        #score {
            font-size: 48px;
            font-weight: bold;
            color: #ffaa44;
            text-shadow: 0 0 20px rgba(255,170,68,0.5);
        }
        
        #combo {
            font-size: 24px;
            color: #ff66ff;
            font-weight: bold;
        }
        
        #combo-bar {
            position: absolute;
            bottom: 50px;
            left: 50%;
            transform: translateX(-50%);
            width: 300px;
            height: 8px;
            background: rgba(255,255,255,0.2);
            border-radius: 4px;
            overflow: hidden;
            z-index: 100;
        }
        
        #combo-fill {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #ff66ff, #ffaa44);
            transition: width 0.1s;
        }
        
        #instructions {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(0,0,0,0.5);
            padding: 10px 15px;
            border-radius: 10px;
            color: #aaa;
            font-size: 12px;
            font-family: monospace;
            z-index: 100;
        }
        
        .fruit-counter {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0,0,0,0.5);
            padding: 10px 20px;
            border-radius: 20px;
            color: #ffaa44;
            font-size: 20px;
            font-family: monospace;
            z-index: 100;
        }
    </style>
</head>
<body>
    <div id="ui">
        <div>⚔️ SLICE MASTER VR</div>
        <div id="score">0</div>
        <div id="combo">🔥 x1</div>
    </div>
    <div id="combo-bar">
        <div id="combo-fill"></div>
    </div>
    <div class="fruit-counter" id="fruit-counter">
        🍎🍊🍉 x <span id="fruit-count">0</span>
    </div>
    <div id="instructions">
        🗡️ Mueve la espada como un samurai | 🎯 Corta frutas | 💣 Evita bombas
        <br>🖱️ CLICK + arrastrar ratón = modo PC | 🕹️ Gatillo en VR
    </div>
    
    <script type="importmap">
        {
            "imports": {
                "three": "./build/three.module.js",
                "three/addons/": "./examples/jsm/"
            }
        }
    </script>
    <script type="module" src="js/main.js"></script>
</body>
</html>
