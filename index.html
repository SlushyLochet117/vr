<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Gravity Grabber VR</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: Arial; }
        #info {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 15px;
            border-radius: 10px;
            pointer-events: none;
            z-index: 10;
        }
        #score { font-size: 24px; color: #ffaa00; margin-top: 10px; }
    </style>
</head>
<body>
    <div id="info">
        <h2>🔮 Gravity Grabber VR</h2>
        <p>🔴 Imán (izquierdo) | 🔵 Repulsor (derecho)</p>
        <div id="score">Puntuación: 0 / 10</div>
    </div>
    <script type="importmap">
        {
            "imports": {
                "three": "./build/three.module.js",
                "three/addons/": "./examples/jsm/"
            }
        }
    </script>
    <script type="module" src="./js/main.js"></script>
</body>
</html>
