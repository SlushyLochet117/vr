<!DOCTYPE html>
<html>
<head>
    <title>VR Test - Slice Master</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: monospace; }
        #info {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0,0,0,0.7);
            padding: 15px;
            border-radius: 10px;
            color: white;
            z-index: 100;
            pointer-events: none;
        }
        #status {
            color: #ffaa44;
            font-weight: bold;
        }
        button {
            position: absolute;
            bottom: 20px;
            right: 20px;
            padding: 15px 30px;
            background: #ff4400;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            cursor: pointer;
            z-index: 100;
        }
    </style>
</head>
<body>
    <div id="info">
        <h2>🗡️ SLICE MASTER VR - TEST</h2>
        <div>Punto rojo = zona de corte</div>
        <div id="status">✅ Cargado</div>
    </div>
    <button id="vrBtn">🔮 ENTER VR</button>

    <script type="importmap">
        {
            "imports": {
                "three": "./build/three.module.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';

        // ========== CONFIGURACIÓN ==========
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0a2a);
        scene.fog = new THREE.FogExp2(0x0a0a2a, 0.03);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 1.6, 2);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.xr.enabled = true;
        document.body.appendChild(renderer.domElement);

        // ========== LUCES ==========
        const ambient = new THREE.AmbientLight(0x404060);
        scene.add(ambient);
        const light = new THREE.DirectionalLight(0xffffff, 1);
        light.position.set(5, 10, 7);
        scene.add(light);

        // ========== SUELO ==========
        const grid = new THREE.GridHelper(15, 20, 0x88aaff, 0x335588);
        grid.position.y = -0.8;
        scene.add(grid);

        // ========== FRUTAS ==========
        const fruits = [];
        const colors = [0xff3333, 0xffaa33, 0x33ff33, 0xff44aa, 0xffaa44];
        
        function spawnFruit() {
            const color = colors[Math.floor(Math.random() * colors.length)];
            const fruit = new THREE.Mesh(
                new THREE.SphereGeometry(0.25, 16, 16),
                new THREE.MeshStandardMaterial({ color: color })
            );
            
            // Posición aleatoria alrededor del jugador
            const angle = Math.random() * Math.PI * 2;
            const radius = 2 + Math.random() * 3;
            fruit.position.set(
                camera.position.x + Math.cos(angle) * radius,
                0.3 + Math.random() * 1.5,
                camera.position.z + Math.sin(angle) * radius
            );
            
            fruit.userData = {
                velocity: new THREE.Vector3(
                    (Math.random() - 0.5) * 2,
                    Math.random() * 3 + 2,
                    (Math.random() - 0.5) * 2
                ),
                gravity: 10
            };
            
            scene.add(fruit);
            fruits.push(fruit);
        }

        // Spawn inicial
        for (let i = 0; i < 8; i++) spawnFruit();
        setInterval(() => {
            if (fruits.length < 10) spawnFruit();
        }, 1500);

        // ========== ESPADA ==========
        const swordGroup = new THREE.Group();
        
        // Hoja
        const blade = new THREE.Mesh(
            new THREE.CylinderGeometry(0.05, 0.08, 0.8, 6),
            new THREE.MeshStandardMaterial({ color: 0x44ffaa, emissive: 0x22ff88 })
        );
        blade.position.y = 0.4;
        swordGroup.add(blade);
        
        // Punta
        const tip = new THREE.Mesh(
            new THREE.SphereGeometry(0.08, 6, 6),
            new THREE.MeshStandardMaterial({ color: 0x88ffcc, emissive: 0x44ffaa })
        );
        tip.position.y = 0.85;
        swordGroup.add(tip);
        
        // Mango
        const handle = new THREE.Mesh(
            new THREE.CylinderGeometry(0.07, 0.07, 0.2, 6),
            new THREE.MeshStandardMaterial({ color: 0x884422 })
        );
        handle.position.y = -0.1;
        swordGroup.add(handle);
        
        scene.add(swordGroup);

        // Punto rojo de debug (zona de corte)
        const dotGeo = new THREE.SphereGeometry(0.1, 6, 6);
        const dotMat = new THREE.MeshStandardMaterial({ color: 0xff0000, emissive: 0xff0000 });
        const aimDot = new THREE.Mesh(dotGeo, dotMat);
        scene.add(aimDot);

        // ========== VARIABLES VR ==========
        let isInVR = false;
        let isSwinging = false;
        let score = 0;
        const scoreDiv = document.getElementById('status');

        function updateScore(points) {
            score += points;
            scoreDiv.innerHTML = `🍎 Puntos: ${score} | 🔴 Acerca el punto rojo a las frutas`;
        }

        // ========== CONTROLADOR VR ==========
        function setupController() {
            const controller = renderer.xr.getController(0);
            if (controller) {
                console.log('✅ Controlador detectado');
                controller.addEventListener('selectstart', () => {
                    console.log('🎮 GATILLO');
                    isSwinging = true;
                });
                controller.addEventListener('selectend', () => {
                    isSwinging = false;
                });
                scene.add(controller);
            } else {
                setTimeout(setupController, 500);
            }
        }

        // ========== ACTUALIZAR ESPADA ==========
        function updateSword() {
            const controller = renderer.xr.getController(0);
            
            if (isInVR && controller && controller.position) {
                // Posición de la espada
                swordGroup.position.copy(controller.position);
                
                // Rotación para que apunte hacia adelante
                const forwardDir = new THREE.Vector3(0, 0, -1).applyQuaternion(controller.quaternion);
                const upDir = new THREE.Vector3(0, 1, 0);
                const quat = new THREE.Quaternion();
                quat.setFromUnitVectors(upDir, forwardDir);
                swordGroup.quaternion.copy(quat);
                
                // Pequeño offset
                const offset = forwardDir.clone().multiplyScalar(0.2);
                swordGroup.position.add(offset);
                
                // Posición de la punta de la espada
                const tipPos = swordGroup.position.clone();
                const direction = new THREE.Vector3(0, 1, 0).applyQuaternion(swordGroup.quaternion);
                tipPos.add(direction.multiplyScalar(0.9));
                aimDot.position.copy(tipPos);
                
                // CORTE AUTOMÁTICO (radio grande)
                for (let i = 0; i < fruits.length; i++) {
                    const fruit = fruits[i];
                    const dist = tipPos.distanceTo(fruit.position);
                    if (dist < 0.6) {
                        // Cortar fruta
                        scene.remove(fruit);
                        fruits.splice(i, 1);
                        updateScore(10);
                        spawnFruit(); // Nueva fruta
                        
                        // Efecto visual
                        aimDot.material.color.setHex(0x00ff00);
                        setTimeout(() => aimDot.material.color.setHex(0xff0000), 100);
                        break;
                    }
                }
            }
        }

        // ========== ACTUALIZAR FRUTAS (física) ==========
        function updateFruits(deltaTime) {
            for (let i = 0; i < fruits.length; i++) {
                const fruit = fruits[i];
                fruit.userData.velocity.y -= fruit.userData.gravity * deltaTime;
                fruit.position.x += fruit.userData.velocity.x * deltaTime;
                fruit.position.y += fruit.userData.velocity.y * deltaTime;
                fruit.position.z += fruit.userData.velocity.z * deltaTime;
                fruit.rotation.x += deltaTime * 2;
                fruit.rotation.y += deltaTime * 3;
                
                // Eliminar si cae al suelo
                if (fruit.position.y < -0.8) {
                    scene.remove(fruit);
                    fruits.splice(i, 1);
                    i--;
                }
            }
        }

        // ========== MOVIMIENTO CON JOYSTICK ==========
        let leftStickX = 0, leftStickY = 0;

        function setupVRMovement() {
            function updateGamepad() {
                if (!isInVR) return;
                const session = renderer.xr.getSession();
                if (!session) return;
                for (let source of session.inputSources) {
                    if (source.handedness === 'left' && source.gamepad) {
                        const axes = source.gamepad.axes;
                        leftStickX = Math.abs(axes[0]) > 0.2 ? axes[0] : 0;
                        leftStickY = Math.abs(axes[1]) > 0.2 ? axes[1] : 0;
                        break;
                    }
                }
                requestAnimationFrame(updateGamepad);
            }
            updateGamepad();
        }

        function applyMovement(deltaTime) {
            if (!isInVR) return;
            if (leftStickX === 0 && leftStickY === 0) return;
            
            const speed = 4 * deltaTime;
            const forward = new THREE.Vector3();
            const right = new THREE.Vector3();
            camera.getWorldDirection(forward);
            forward.y = 0;
            forward.normalize();
            right.crossVectors(new THREE.Vector3(0, 1, 0), forward);
            
            camera.position.x += (right.x * leftStickX + forward.x * leftStickY) * speed;
            camera.position.z += (right.z * leftStickX + forward.z * leftStickY) * speed;
        }

        // ========== BOTÓN VR ==========
        const vrBtn = document.getElementById('vrBtn');
        vrBtn.onclick = async () => {
            try {
                if (renderer.xr.isPresenting) {
                    await renderer.xr.getSession()?.end();
                    vrBtn.textContent = '🔮 ENTER VR';
                    isInVR = false;
                } else {
                    const session = await navigator.xr.requestSession('immersive-vr', {
                        requiredFeatures: ['local-floor']
                    });
                    await renderer.xr.setSession(session);
                    vrBtn.textContent = '⬅️ SALIR VR';
                    isInVR = true;
                    setTimeout(() => {
                        setupController();
                        setupVRMovement();
                    }, 500);
                    scoreDiv.innerHTML = '🥽 En VR! Mueve la espada hacia las frutas';
                }
            } catch(err) {
                console.error(err);
                alert('Error: ' + err.message);
            }
        };

        // ========== EVENTOS VR ==========
        renderer.xr.addEventListener('sessionstart', () => {
            console.log('🥽 VR iniciada');
            scoreDiv.innerHTML = '🥽 En VR! Acerca el PUNTO ROJO a las frutas';
        });

        renderer.xr.addEventListener('sessionend', () => {
            isInVR = false;
            scoreDiv.innerHTML = '✅ Cargado';
        });

        // ========== LOOP PRINCIPAL ==========
        let lastTime = 0;

        function animate() {
            const now = performance.now();
            let delta = Math.min(0.033, (now - lastTime) / 1000);
            lastTime = now;
            
            applyMovement(delta);
            updateSword();
            updateFruits(delta);
            
            renderer.render(scene, camera);
            requestAnimationFrame(animate);
        }
        
        animate();
        
        console.log('🗡️ SLICE MASTER VR - TEST');
        console.log('🎯 Busca el PUNTO ROJO, acércalo a las frutas');
    </script>
</body>
</html>
