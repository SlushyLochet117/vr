<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gravity Grabber VR</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Arial', sans-serif;
        }
        
        #info {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0,0,0,0.8);
            color: white;
            padding: 15px;
            border-radius: 10px;
            pointer-events: none;
            z-index: 10;
            font-size: 14px;
            backdrop-filter: blur(5px);
            border-left: 4px solid #ff4400;
        }
        
        #score {
            font-size: 24px;
            color: #ffaa00;
            margin-top: 10px;
            font-weight: bold;
        }
        
        #controls-info {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(0,0,0,0.6);
            color: #ccc;
            padding: 10px;
            border-radius: 8px;
            font-size: 12px;
            pointer-events: none;
            font-family: monospace;
        }
        
        #vrButton {
            position: absolute;
            bottom: 20px;
            right: 20px;
            padding: 15px 30px;
            background: #ff4400;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            z-index: 100;
            font-size: 18px;
            font-weight: bold;
            font-family: monospace;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        
        #vrButton:hover {
            background: #ff6600;
            transform: scale(1.05);
        }
        
        #loading {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.9);
            color: white;
            padding: 30px;
            border-radius: 15px;
            z-index: 1000;
            text-align: center;
            font-size: 18px;
            border: 2px solid #ff4400;
        }
        
        .spinner {
            border: 4px solid #333;
            border-top: 4px solid #ff4400;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div id="info">
        <h2>🔮 Gravity Grabber VR</h2>
        <p>🔴 Imán (gatillo IZQUIERDO)</p>
        <p>🔵 Repulsor (gatillo DERECHO)</p>
        <p>🟢 Teletransporte (GRIP izquierdo + apuntar)</p>
        <div id="score">Puntuación: 0 / 5</div>
    </div>
    <div id="controls-info">
        🎮 Presiona ENTER VR y luego acepta los permisos
    </div>
    
    <button id="vrButton">🔮 ENTER VR</button>
    
    <div id="loading">
        <div class="spinner"></div>
        <div>Cargando Gravity Grabber VR...</div>
        <div id="status" style="font-size: 12px; margin-top: 10px;">Inicializando</div>
    </div>
    
    <script type="importmap">
        {
            "imports": {
                "three": "./build/three.module.js",
                "three/addons/": "./examples/jsm/"
            }
        }
    </script>
    <script type="module" src="js/main.js"></script>
</body>
</html>
